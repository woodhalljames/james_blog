{% extends "base.html" %}

{% block content %}
<div class="container">
    {% if tag %}
        <h2>#{{ tag.name }}</h2>
    {% endif %}

    <div class="post-grid">
        {% for post in posts %}
            <div class="post-card">
                {% if post.featured_image %}
                    <a href="{{ post.get_absolute_url }}" class="post-image">
                        <div class="image-item" style="aspect-ratio: 1/1; overflow: hidden; display: flex; align-items: center; justify-content: center;">
                            <img src="{{ post.featured_image.url }}" 
                                 alt="{{ post.featured_image_alt|default:post.title }}"
                                 loading="lazy"
                                 style="min-width: 100%; min-height: 100%; object-fit: cover; object-position: center;">
                        </div>
                    </a>
                {% endif %}
            </div>
        {% empty %}
            <p>No posts.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
