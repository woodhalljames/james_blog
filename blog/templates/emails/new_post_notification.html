<!DOCTYPE html>
<html>
<body>
    <h2>New Blog Post: {{ post_title }}</a></h2>
    
    <p>{{ post_content|safe|truncatewords:80 }}</p>
    
    <p>Read the full post here: <a href="{{ post_url }}">{{ post_url }}</a></p>
    
    <hr>
    <p><small>You're receiving this because you subscribed to {{ site_name }}'s blog updates.</small></p>
    <p><small>To unsubscribe from these notifications, <a href="{{ unsubscribe_url }}">click here</a></small></p>
</body>
</html>
